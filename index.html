<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Focus Timer</title>
  <meta name="description" content="A clean, distraction-free Pomodoro timer. No accounts, no tracking."/>

  <!-- ============================================================
       CONFIG — edit this block to customize the app
       ============================================================ -->
  <script>
    window.APP_CONFIG = {
      appName:  "Focus Timer",
      author: {
        email:  "dsmyatskiy@gmail.com",
        github: "dsmyatskiy",        // https://github.com/dsmyatskiy
      },
      defaults: {
        pomo:      25,   // minutes
        short:      5,
        long:      15,
        cycle:      4,   // pomodoros before long break
        volume:   0.7,
        sound:   "bell", // bell | digital | soft
      },
    };
  </script>
  <!-- ============================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #2a2d35; font-family: 'Outfit', sans-serif; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 3px; border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: #e2c97e; cursor: pointer; border: 2px solid #2a2d35;
    }
    input[type=number] {
      -moz-appearance: textfield;
      background: #323640; border: 1px solid rgba(255,255,255,0.08);
      color: #e8e6e1; border-radius: 8px; padding: 6px 8px;
      font-size: 14px; font-family: 'JetBrains Mono', monospace;
      text-align: center; outline: none; width: 64px;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    button { transition: opacity 0.12s, transform 0.1s; cursor: pointer; }
    button:active { transform: scale(0.95); }
    a { color: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(function() {
  const {useState, useEffect, useRef} = React;
  const h = React.createElement;
  const CFG = window.APP_CONFIG;

  // ── palette ──────────────────────────────────────────────────
  const AC      = "#e2c97e";
  const AC_DIM  = "rgba(226,201,126,0.12)";
  const BG      = "#2a2d35";
  const CARD    = "#32353f";
  const INNER   = "#2a2d35";
  const BORDER  = "rgba(255,255,255,0.07)";
  const TEXT    = "#e8e6e1";
  const MUTED   = "rgba(232,230,225,0.42)";
  const DIM     = "rgba(232,230,225,0.18)";

  // ── localStorage helpers ──────────────────────────────────────
  function ls(k, def) {
    try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; }
    catch { return def; }
  }
  function lss(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

  // ── IndexedDB helpers (persistent custom audio) ───────────────
  const IDB_NAME = "pomo_db", IDB_STORE = "files", IDB_KEY = "custom_audio";
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
      req.onsuccess = e => res(e.target.result);
      req.onerror   = () => rej(req.error);
    });
  }
  async function idbSave(blob, name) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put({ blob, name }, IDB_KEY);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }
  async function idbLoad() {
    try {
      const db = await openDB();
      return new Promise(res => {
        const req = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).get(IDB_KEY);
        req.onsuccess = () => res(req.result || null);
        req.onerror   = () => res(null);
      });
    } catch { return null; }
  }

  // ── constants ─────────────────────────────────────────────────
  const MODES = ["pomo", "short", "long"];
  const MCFG  = {
    pomo:  { label: "Focus",       tag: "FOCUS"       },
    short: { label: "Short break", tag: "SHORT BREAK" },
    long:  { label: "Long break",  tag: "LONG BREAK"  },
  };

  function pad(n) { return String(n).padStart(2, "0"); }
  function fmt(s) { return `${pad(Math.floor(s / 60))}:${pad(s % 60)}`; }

  // ── audio ─────────────────────────────────────────────────────
  let ax = null;
  function gax() {
    if (!ax) ax = new (window.AudioContext || window.webkitAudioContext)();
    return ax;
  }
  // Call this on every user click to keep AudioContext alive
  function unlockAudio() {
    const c = gax();
    if (c.state === "suspended") c.resume();
  }
  function beep(type, vol, buf) {
    const c = gax();
    // resume if browser suspended the context (autoplay policy)
    const play = () => {
      const m = c.createGain();
      m.gain.value = vol;
      m.connect(c.destination);
      if (type === "custom" && buf) {
        const s = c.createBufferSource(); s.buffer = buf; s.connect(m); s.start(); return;
      }
      const sets = {
        bell:    [[523,0,1.2,"sine"],[659,0.18,1.0,"sine"],[784,0.36,1.0,"sine"],[1047,0.6,1.4,"sine"],[784,1.2,0.8,"sine"]],
        digital: [[880,0,0.12,"square"],[1100,0.18,0.12,"square"],[880,0.36,0.12,"square"],[1320,0.54,0.15,"square"],[880,0.75,0.12,"square"],[1100,0.93,0.15,"square"]],
        soft:    [[330,0,1.2,"sine"],[440,0.35,1.1,"sine"],[528,0.75,1.0,"sine"],[440,1.2,0.9,"sine"]],
      }[type] || [];
      sets.forEach(([f, d, dur, tp]) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = tp; o.frequency.value = f; o.connect(g); g.connect(m);
        const t = c.currentTime + d;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.5, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.start(t); o.stop(t + dur + 0.02);
      });
    };
    if (c.state === "suspended") {
      c.resume().then(play);
    } else {
      play();
    }
  }

  // ── favicon ───────────────────────────────────────────────────
  function setFavicon(mode, running) {
    const canvas = document.createElement("canvas");
    canvas.width = canvas.height = 32;
    const ctx = canvas.getContext("2d");
    const color = mode === "pomo" ? "#e2c97e" : mode === "short" ? "#7eb8e2" : "#7ee2a0";
    // background circle
    ctx.beginPath();
    ctx.arc(16, 16, 15, 0, Math.PI * 2);
    ctx.fillStyle = "#2a2d35";
    ctx.fill();
    // ring
    ctx.beginPath();
    ctx.arc(16, 16, 13, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.lineWidth = 3;
    ctx.stroke();
    // accent dot or pause bars
    if (!running) {
      // two pause bars
      ctx.fillStyle = color;
      ctx.fillRect(10, 10, 4, 12);
      ctx.fillRect(18, 10, 4, 12);
    } else {
      // play triangle
      ctx.beginPath();
      ctx.moveTo(12, 9); ctx.lineTo(23, 16); ctx.lineTo(12, 23);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }
    let link = document.querySelector("link[rel~='icon']");
    if (!link) { link = document.createElement("link"); link.rel = "icon"; document.head.appendChild(link); }
    link.href = canvas.toDataURL();
  }

  // ── notifications ─────────────────────────────────────────────
  function requestNotifPerm() {
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  }
  function sendNotif(title, body) {
    if ("Notification" in window && Notification.permission === "granted") {
      try { new Notification(title, { body }); } catch {}
    }
  }
  function ConfirmModal({ onConfirm, onCancel }) {
    return h("div", { style: { position:"absolute",inset:0,background:"rgba(20,22,28,0.88)",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10 } },
      h("div", { style: { background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:"28px 28px 22px",maxWidth:260,width:"90%",textAlign:"center" } },
        h("div", { style: { fontSize:24,marginBottom:12 } }, "🍅"),
        h("p",   { style: { fontSize:15,fontWeight:600,color:TEXT,marginBottom:8,lineHeight:1.4 } }, "Reset session counter?"),
        h("p",   { style: { fontSize:13,color:MUTED,marginBottom:24,lineHeight:1.5 } }, "All progress for today will be cleared."),
        h("div", { style: { display:"flex",gap:8 } },
          h("button", { style: { flex:1,padding:"10px",borderRadius:9,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,fontSize:14,fontFamily:"inherit",fontWeight:500 }, onClick: onCancel }, "Cancel"),
          h("button", { style: { flex:1,padding:"10px",borderRadius:9,border:"none",background:AC,color:"#1c1a14",fontSize:14,fontFamily:"inherit",fontWeight:700 }, onClick: onConfirm }, "Reset")
        )
      )
    );
  }

  // ── App ───────────────────────────────────────────────────────
  function App() {
    const D = CFG.defaults;

    // restore timer state: compute elapsed time since page was closed
    const initTimer = () => {
      const saved = ls("pomo_timer", null);
      if (!saved) return { mode: "pomo", tL: D.pomo * 60, tT: D.pomo * 60, wasRunning: false };
      const { mode: m, tT, tL: savedTL, baseLeft, startedAt, wasRunning } = saved;
      const safeTT = tT || D.pomo * 60;
      if (wasRunning && startedAt && baseLeft != null) {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const remaining = Math.max(0, baseLeft - elapsed);
        return { mode: m || "pomo", tL: remaining, tT: safeTT, wasRunning: remaining > 0 };
      }
      return { mode: m || "pomo", tL: savedTL ?? safeTT, tT: safeTT, wasRunning: false };
    };

    const init = initTimer();
    const [cfg,      setCfg]      = useState(() => ls("pomo_cfg", { pomo: D.pomo, short: D.short, long: D.long, cycle: D.cycle }));
    const [mode,     setMode]     = useState(init.mode);
    const [tL,       setTL]       = useState(init.tL);
    const [tT,       setTT]       = useState(init.tT);
    const [run,      setRun]      = useState(init.wasRunning);
    const [total,    setTotal]    = useState(() => ls("pomo_total", 0));
    const [cyc,      setCyc]      = useState(() => ls("pomo_cyc", 0));
    const [showSet,  setShowSet]  = useState(false);
    const [showAbout,setShowAbout]= useState(false);
    const [confirm,  setConfirm]  = useState(false);
    const [snd,      setSnd]      = useState(() => ls("pomo_snd", D.sound));
    const [vol,      setVol]      = useState(() => ls("pomo_vol", D.volume));
    const [cbuf,     setCbuf]     = useState(null);
    const [cname,    setCname]    = useState("");

    const iRef = useRef(null);
    const endR = useRef(false);
    const st   = useRef({});
    st.current = { mode, cfg, total, cyc, snd, vol, cbuf };

    // load persisted custom sound from IndexedDB on first render
    useEffect(() => {
      idbLoad().then(rec => {
        if (!rec) return;
        rec.blob.arrayBuffer()
          .then(ab => gax().decodeAudioData(ab))
          .then(buf => { setCbuf(buf); setCname(rec.name); });
      });
    }, []);

    useEffect(() => lss("pomo_cfg",   cfg),   [cfg]);
    useEffect(() => lss("pomo_total", total), [total]);
    useEffect(() => lss("pomo_cyc",   cyc),   [cyc]);
    useEffect(() => lss("pomo_snd",   snd),   [snd]);
    useEffect(() => lss("pomo_vol",   vol),   [vol]);

    // save startedAt only when run toggles, not on every tick
    useEffect(() => {
      const saved = ls("pomo_timer", {});
      if (run) {
        // record the moment we started and how many seconds were left at that moment
        lss("pomo_timer", { ...saved, mode, tT, startedAt: Date.now(), baseLeft: tL, wasRunning: true });
      } else {
        lss("pomo_timer", { ...saved, mode, tT, tL, startedAt: null, wasRunning: false });
      }
    }, [run]); // eslint-disable-line

    // keep mode/tT in sync (but not tL — that would overwrite the running baseline)
    useEffect(() => {
      if (!run) lss("pomo_timer", { ...ls("pomo_timer", {}), mode, tT, tL, startedAt: null, wasRunning: false });
    }, [mode, tT]); // eslint-disable-line

    // update favicon
    useEffect(() => { setFavicon(mode, run); }, [mode, run]);

    const [notifPerm, setNotifPerm] = useState(() =>
      "Notification" in window ? Notification.permission : "denied"
    );
    const askNotifPerm = () => {
      if (!("Notification" in window)) return;
      if (Notification.permission !== "default") return;
      Notification.requestPermission().then(p => setNotifPerm(p));
    };

    // update tab title
    useEffect(() => {
      document.title = run ? `${fmt(tL)} — ${MCFG[mode].tag}` : CFG.appName;
    }, [tL, run, mode]);

    const go = (m, c) => {
      clearInterval(iRef.current); setRun(false); setMode(m);
      const s = c || st.current.cfg;
      const sec = (m === "pomo" ? s.pomo : m === "short" ? s.short : s.long) * 60;
      setTL(sec); setTT(sec);
      lss("pomo_timer", { mode: m, tL: sec, tT: sec, startedAt: null, wasRunning: false });
    };

    useEffect(() => {
      if (!run) return;
      iRef.current = setInterval(() => {
        setTL(p => {
          if (p <= 1) {
            clearInterval(iRef.current);
            endR.current = true;
            return 0;
          }
          return p - 1;
        });
      }, 1000);
      return () => clearInterval(iRef.current);
    }, [run]);

    // watch for timer end — runs after every render, fires once when endR is set
    useEffect(() => {
      if (!endR.current) return;
      endR.current = false;
      setRun(false);
      // play sound and send notification here, outside state updater
      const { snd: s, vol: v, cbuf: b, mode: m } = st.current;
      beep(s, v, b);
      const notifText = m === "pomo"
        ? { title: "Focus session done! 🍅", body: "Time for a break." }
        : { title: "Break's over!", body: "Ready to focus again?" };
      sendNotif(notifText.title, notifText.body);
      // advance to next mode
      const { total: t, cyc: ic, cfg: c } = st.current;
      if (m === "pomo") {
        const nt = t + 1, nc = ic + 1;
        setTotal(nt);
        if (nc >= c.cycle) { setCyc(0); go("long"); }
        else               { setCyc(nc); go("short"); }
      } else {
        go("pomo");
      }
    });

    const skip = () => {
      clearInterval(iRef.current); setRun(false);
      const { mode: m, total: t, cyc: ic, cfg: c } = st.current;
      if (m === "pomo") {
        const nt = t + 1, nc = ic + 1; setTotal(nt);
        if (nc >= c.cycle) { setCyc(0); go("long"); }
        else               { setCyc(nc); go("short"); }
      } else { go("pomo"); }
    };

    const restart = () => {
      clearInterval(iRef.current); setRun(false);
      const { mode: m, cfg: c } = st.current;
      const sec = (m === "pomo" ? c.pomo : m === "short" ? c.short : c.long) * 60;
      setTL(sec); setTT(sec);
    };

    const chCfg = (k, v) => {
      const n = Math.max(1, parseInt(v) || 1);
      const next = { ...cfg, [k]: n }; setCfg(next);
      if (!run) go(mode, next);
    };

    const upload = async (ev) => {
      const f = ev.target.files[0]; if (!f) return;
      const shortName = f.name.length > 16 ? f.name.slice(0, 14) + "…" : f.name;
      setCname(shortName);
      const ab = await f.arrayBuffer();
      const buf = await gax().decodeAudioData(ab.slice(0));
      setCbuf(buf);
      setSnd("custom");
      // persist the original file blob so it survives page reload
      await idbSave(new Blob([ab], { type: f.type }), shortName);
    };

    const incTotal = () => { const n = total + 1; setTotal(n); setCyc(n % cfg.cycle); };
    const decTotal = () => { if (total > 0) { const n = total - 1; setTotal(n); setCyc(n % cfg.cycle); } };
    const doReset  = () => { setTotal(0); setCyc(0); setConfirm(false); };

    const pct  = tT > 0 ? tL / tT : 1;
    const R    = 108, C = 240, circ = 2 * Math.PI * R;
    const dots = Array.from({ length: cfg.cycle }, (_, i) => i < cyc);

    const ibtn = (extra = {}) => ({
      background: INNER, border: `1px solid ${BORDER}`, borderRadius: 10,
      color: MUTED, display: "flex", alignItems: "center", justifyContent: "center",
      width: 40, height: 40, ...extra,
    });
    const chip = (active) => ({
      padding: "6px 14px", borderRadius: 8,
      border: `1px solid ${active ? AC : BORDER}`,
      background: active ? AC_DIM : "transparent",
      color: active ? AC : MUTED,
      fontSize: 13, fontWeight: active ? 600 : 400, fontFamily: "Outfit, sans-serif",
    });
    const adjBtn = (onClick, symbol) => h("button", {
      onClick, style: {
        width: 32, height: 32, borderRadius: 8, border: `1px solid ${BORDER}`,
        background: INNER, color: MUTED, fontSize: 18, fontWeight: 300,
        display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit",
      }
    }, symbol);

    return h("div", { style: { minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 20px 60px",fontFamily:"'Outfit',sans-serif",color:TEXT } },

      // ── top bar ──
      h("div", { style: { width:"100%",maxWidth:460,display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28 } },
        h("div", { style: { display:"flex",alignItems:"center",gap:8 } },
          h("svg", { width:18,height:18,viewBox:"0 0 24 24",fill:"none" },
            h("circle", { cx:12,cy:12,r:10,fill:AC_DIM,stroke:AC,strokeWidth:1.5 }),
            h("path",   { d:"M12 7v5l3 3",stroke:AC,strokeWidth:1.8,strokeLinecap:"round" })
          ),
          h("span", { style: { fontWeight:600,fontSize:16,color:TEXT } }, CFG.appName)
        ),
        h("div", { style: { display:"flex",gap:6 } },
          h("button", {
            style: { ...ibtn(), width:"auto",padding:"0 12px",fontSize:12,fontWeight:500,fontFamily:"inherit", background:showAbout?AC_DIM:"transparent",color:showAbout?AC:MUTED,border:`1px solid ${showAbout?AC:BORDER}` },
            onClick: () => { setShowAbout(s => !s); setShowSet(false); }
          }, showAbout ? "✕ About" : "About"),
          h("button", {
            style: { ...ibtn(), width:"auto",padding:"0 12px",fontSize:12,fontWeight:500,fontFamily:"inherit", background:showSet?AC_DIM:"transparent",color:showSet?AC:MUTED,border:`1px solid ${showSet?AC:BORDER}` },
            onClick: () => { setShowSet(s => !s); setShowAbout(false); }
          }, showSet ? "✕ Settings" : "⚙ Settings")
        )
      ),

      // ── main card ──
      h("div", { style: { width:"100%",maxWidth:460,background:CARD,borderRadius:22,border:`1px solid ${BORDER}`,overflow:"hidden",position:"relative" } },

        confirm && h(ConfirmModal, { onConfirm: doReset, onCancel: () => setConfirm(false) }),

        // mode tabs
        h("div", { style: { display:"flex",borderBottom:`1px solid ${BORDER}` } },
          MODES.map(m => h("button", {
            key: m,
            style: { flex:1,padding:"15px 8px",border:"none",fontSize:14,fontWeight:mode===m?600:400,
              background:mode===m?INNER:"transparent",color:mode===m?AC:MUTED,
              borderBottom:mode===m?`2px solid ${AC}`:"2px solid transparent",
              fontFamily:"inherit",transition:"all 0.2s" },
            onClick: () => go(m)
          }, MCFG[m].label))
        ),

        h("div", { style: { display:"flex",flexDirection:"column",alignItems:"center",padding:"36px 32px 32px" } },

          // ring
          h("div", { style: { position:"relative",width:C,height:C,marginBottom:24 } },
            h("svg", { width:C,height:C,viewBox:`0 0 ${C} ${C}`,style:{ transform:"rotate(-90deg)" } },
              h("circle", { cx:C/2,cy:C/2,r:R,fill:"none",stroke:INNER,strokeWidth:12 }),
              h("circle", { cx:C/2,cy:C/2,r:R,fill:"none",stroke:DIM,strokeWidth:12,opacity:0.4 }),
              h("circle", { cx:C/2,cy:C/2,r:R,fill:"none",stroke:AC,strokeWidth:12,strokeLinecap:"round",
                strokeDasharray:circ,strokeDashoffset:circ*(1-pct),
                style:{ transition:"stroke-dashoffset 0.9s linear" }
              })
            ),
            h("div", { style: { position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center" } },
              h("div", { style: { fontFamily:"'JetBrains Mono',monospace",fontSize:64,fontWeight:700,letterSpacing:"-3px",lineHeight:1,color:TEXT } }, fmt(tL)),
              h("div", { style: { fontSize:11,letterSpacing:"0.14em",color:DIM,marginTop:10,fontWeight:500 } }, MCFG[mode].tag)
            )
          ),

          // controls
          h("div", { style: { display:"flex",alignItems:"center",gap:12,marginBottom:28 } },
            h("button", { style: ibtn(), title:"Restart", onClick: restart },
              h("svg", { width:16,height:16,fill:"none",stroke:"currentColor",strokeWidth:2,viewBox:"0 0 24 24" },
                h("path",     { d:"M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.05 2.36" }),
                h("polyline", { points:"1,7 3,12 8,10" })
              )
            ),
            h("button", {
              style: { background:AC,border:"none",borderRadius:13,color:"#1c1a14",fontSize:16,fontWeight:700,
                letterSpacing:"0.1em",padding:"16px 0",width:160,fontFamily:"inherit" },
              onClick: () => { if (tL > 0) { unlockAudio(); askNotifPerm(); setRun(r => !r); } }
            }, run ? "PAUSE" : tL < tT && tL > 0 ? "RESUME" : "START"),
            h("button", { style: ibtn(), title:"Skip", onClick: skip },
              h("svg", { width:16,height:16,fill:"currentColor",viewBox:"0 0 24 24" },
                h("polygon", { points:"5,4 14,12 5,20" }),
                h("rect",    { x:17,y:4,width:2.5,height:16,rx:1 })
              )
            )
          ),

          // cycle dots
          h("div", { style: { display:"flex",gap:7,marginBottom:18 } },
            dots.map((done, i) => h("div", { key:i, style: {
              width: done ? 22 : 8, height: 8, borderRadius: 4,
              background: done ? AC : DIM,
              transition: "all 0.35s cubic-bezier(0.34,1.56,0.64,1)",
            }}))
          ),

          // counter row: − | [number] | +
          h("div", { style: { display:"flex",alignItems:"center",gap:12 } },
            adjBtn(decTotal, "−"),
            h("button", {
              onClick: () => setConfirm(true),
              title: "Click to reset",
              style: { background:"transparent",border:`1px solid ${BORDER}`,borderRadius:11,
                padding:"8px 24px",cursor:"pointer",display:"flex",flexDirection:"column",
                alignItems:"center",gap:1,fontFamily:"inherit",minWidth:100 }
            },
              h("span", { style: { fontFamily:"'JetBrains Mono',monospace",fontSize:30,fontWeight:700,color:AC,lineHeight:1 } }, total),
              h("span", { style: { fontSize:11,color:DIM,letterSpacing:"0.06em",marginTop:3 } }, total === 1 ? "session" : "sessions")
            ),
            adjBtn(incTotal, "+")
          )
        )
      ),

      // ── settings panel ──
      showSet && h("div", { style: { width:"100%",maxWidth:460,background:CARD,borderRadius:16,border:`1px solid ${BORDER}`,padding:"22px 24px",marginTop:12 } },
        h("p", { style: { fontSize:11,letterSpacing:"0.12em",color:DIM,fontWeight:600,marginBottom:16 } }, "TIMER DURATIONS (MIN)"),
        [["pomo","Pomodoro"],["short","Short break"],["long","Long break"],["cycle","Long break every (sessions)"]].map(([k, l]) =>
          h("div", { key:k, style: { display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11 } },
            h("span", { style: { fontSize:14,color:MUTED } }, l),
            h("input", { type:"number",min:1,max:k==="cycle"?20:120,value:cfg[k],onChange:ev=>chCfg(k,ev.target.value) })
          )
        ),
        h("div", { style: { height:1,background:BORDER,margin:"18px 0" } }),
        h("p", { style: { fontSize:11,letterSpacing:"0.12em",color:DIM,fontWeight:600,marginBottom:14 } }, "ALARM SOUND"),
        h("div", { style: { display:"flex",gap:6,flexWrap:"wrap",marginBottom:12 } },
          ["bell","digital","soft"].map(t =>
            h("button", { key:t, style:chip(snd===t), onClick:()=>setSnd(t) }, t.charAt(0).toUpperCase()+t.slice(1))
          ),
          cbuf && h("button", { style:chip(snd==="custom"), onClick:()=>setSnd("custom") }, cname),
          h("label", { style: { ...chip(false),display:"inline-flex",alignItems:"center",gap:5,cursor:"pointer",borderStyle:"dashed" } },
            h("svg", { width:11,height:11,fill:"none",stroke:"currentColor",strokeWidth:2,viewBox:"0 0 24 24" },
              h("path",     { d:"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }),
              h("polyline", { points:"17 8 12 3 7 8" }),
              h("line",     { x1:12,y1:3,x2:12,y2:15 })
            ), "Upload",
            h("input", { type:"file",accept:"audio/*",style:{ display:"none" },onChange:upload })
          ),
          h("button", { style:{ ...chip(false),borderColor:"transparent" }, onClick:()=>beep(snd,vol,cbuf) }, "▶ test")
        ),
        h("div", { style: { display:"flex",alignItems:"center",gap:10 } },
          h("span", { style: { fontSize:13,color:MUTED,minWidth:52 } }, "Volume"),
          h("input", { type:"range",min:0,max:100,step:1,value:Math.round(vol*100),
            style: { flex:1,background:`linear-gradient(to right,${AC} ${Math.round(vol*100)}%,${DIM} ${Math.round(vol*100)}%)` },
            onChange: ev => {
              const el = ev.target;
              el.style.background = `linear-gradient(to right,${AC} ${el.value}%,${DIM} ${el.value}%)`;
              setVol(parseInt(el.value) / 100);
            }
          }),
          h("span", { style: { fontSize:12,fontFamily:"JetBrains Mono,monospace",color:MUTED,minWidth:34,textAlign:"right" } }, `${Math.round(vol*100)}%`)
        ),
        h("div", { style: { height:1,background:BORDER,margin:"18px 0" } }),
        h("p", { style: { fontSize:11,letterSpacing:"0.12em",color:DIM,fontWeight:600,marginBottom:14 } }, "BROWSER NOTIFICATIONS"),
        h("div", { style: { display:"flex",alignItems:"center",justifyContent:"space-between" } },
          h("span", { style: { fontSize:13,color:MUTED } },
            notifPerm === "granted"  ? "✓ Enabled" :
            notifPerm === "denied"   ? "Blocked in browser settings" :
            "Get notified when a session ends"
          ),
          notifPerm !== "granted" && notifPerm !== "denied" &&
            h("button", {
              style: { ...chip(false), fontSize:12 },
              onClick: askNotifPerm
            }, "Enable")
        ),
        notifPerm === "denied" && h("p", { style: { fontSize:11,color:DIM,marginTop:6,lineHeight:1.5 } },
          "To enable: click the lock icon in the address bar → Notifications → Allow."
        )
      ),

      // ── about panel ──
      showAbout && h("div", { style: { width:"100%",maxWidth:460,background:CARD,borderRadius:16,border:`1px solid ${BORDER}`,padding:"22px 24px",marginTop:12 } },
        h("p", { style: { fontSize:11,letterSpacing:"0.12em",color:DIM,fontWeight:600,marginBottom:16 } }, "ABOUT"),
        h("p", { style: { fontSize:14,color:MUTED,lineHeight:1.7,marginBottom:20 } },
          "A clean, distraction-free Pomodoro timer. No accounts, no tracking, works offline. Your settings and session count are saved locally in your browser."
        ),
        h("div", { style: { height:1,background:BORDER,margin:"0 0 16px" } }),
        h("p", { style: { fontSize:11,letterSpacing:"0.12em",color:DIM,fontWeight:600,marginBottom:14 } }, "CONTACT & SUPPORT"),
        h("div", { style: { display:"flex",flexDirection:"column",gap:8 } },
          h("a", { href:`mailto:${CFG.author.email}`, style: { display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:INNER,borderRadius:10,border:`1px solid ${BORDER}`,color:MUTED,fontSize:14,textDecoration:"none" } },
            h("svg", { width:15,height:15,fill:"none",stroke:AC,strokeWidth:1.8,viewBox:"0 0 24 24" },
              h("rect",     { x:2,y:4,width:20,height:16,rx:2 }),
              h("polyline", { points:"2,4 12,13 22,4" })
            ),
            CFG.author.email
          ),

          h("a", { href:`https://github.com/${CFG.author.github}`, target:"_blank", rel:"noopener",
            style: { display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:INNER,borderRadius:10,border:`1px solid ${BORDER}`,color:MUTED,fontSize:14,textDecoration:"none" } },
            h("svg", { width:15,height:15,fill:MUTED,viewBox:"0 0 24 24" },
              h("path", { d:"M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z" })
            ),
            "GitHub"
          )
        ),
        h("p", { style: { fontSize:11,color:DIM,marginTop:16,textAlign:"center" } }, `© ${new Date().getFullYear()} ${CFG.author.github}`)
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>
</body>
</html>
